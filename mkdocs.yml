site_name: trustguard
site_description: Complete validation framework for LLM inputs and outputs with pluggable judges
site_author: Your Name
site_url: https://github.com/Dr-Mo-Khalaf/trustguard

repo_name: Dr-Mo-Khalaf/trustguard
repo_url: https://github.com/Dr-Mo-Khalaf/trustguard
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
    - content.action.edit
    - content.action.view
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            show_source: true
            show_root_heading: true
            heading_level: 3
            docstring_style: google

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - footnotes
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Quick Start: quickstart.md
  - Core Concepts: concepts.md
  - Schema Validation: schemas.md
  - Rules System: rules.md
  - Judge System: judges.md
  - Examples: examples.md
  - API Reference: api.md
  - Contributing: contributing.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Dr-Mo-Khalaf/trustguard
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/trustguard/
    - icon: fontawesome/brands/twitter
      link: https://www.linkedin.com/in/dr-mohammed-khalaf-salama-718959243/
  consent:
    title: Cookie consent
    description: >-
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.
  analytics:
    provider: google
    property: G-XXXXXXXXXX
  version:
    provider: mike

copyright: Copyright &copy; 2026 Mohammed Khalaf Salama

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js
